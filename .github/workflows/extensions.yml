name: Extensions

on:
  workflow_call:
    inputs:
      version:
        type: string
      is_release:
        type: string
    secrets:
      GH_EXTENSIONS_TOKEN:
        required: true

permissions:
  actions: write
  contents: read

jobs:
  check-artifacts:
    name: Check if artifacts are available
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: |
          chmod +x .ci_cd/check_artifacts.sh
          .ci_cd/check_artifacts.sh "${{ inputs.version }}" "${{ inputs.is_release }}"

  create-extensions-release:
    name: Create release
    runs-on: ubuntu-latest
    needs: check-artifacts
    if: ${{ inputs.is_release == 'true' }}
    steps:
      - run: gh release create "${{ inputs.version }}" -R openremote/extensions --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GH_EXTENSIONS_TOKEN }}

  trigger-extensions-ci-cd:
    name: Run CI/CD
    runs-on: ubuntu-latest
    needs: check-artifacts
    steps:
      - run: gh workflow run ci_cd.yml -R openremote/extensions -f VERSION="${{ inputs.version }}" -f IS_RELEASE="${{ inputs.is_release }}"
        env:
          GH_TOKEN: ${{ secrets.GH_EXTENSIONS_TOKEN }}
