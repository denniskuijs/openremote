name: Process ci_cd.json file
description: Processes the ci_cd.json file to determine artifact publishing tags and deployments

inputs:
  IS_MAIN_REPO:
    description: Whether this is the main repository that builds the manager
  MANAGER_VERSION:
    description: The manager version specified in the main repository
  IS_RELEASE:
    description: Whether this is a release
  VERSION:
    description: The current version

outputs:
  dockerTags:
    description: The Docker tags to be published
    value: ${{ steps.ci-cd-output.outputs.dockerTags }}
  mavenTag:
    description: The Maven version tag to be published
    value: ${{ steps.ci-cd-output.outputs.mavenTag }}
  npmTag:
    description: The NPM version tag to be published
    value: ${{ steps.ci-cd-output.outputs.npmTag }}
  deploys:
    description: The deployments to be done
    value: ${{ steps.ci-cd-output.outputs.deploys }}

runs:
  using: composite
  steps:
    - name: Check ci_cd existence
      id: check_cicd_json
      uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
      with:
        files: ".ci_cd/ci_cd.json"

    - name: Process ci_cd.json file
      if: ${{ steps.check_cicd_json.outputs.files_exists == 'true' && (github.ref_type == 'tag' || github.event_name != 'pull_request') }}
      id: ci-cd-output
      shell: python
      run: |
        import json
        import os

        eventName = os.getenv('GITHUB_EVENT_NAME')
        refName = os.getenv('GITHUB_REF_NAME')
        refType = os.getenv('GITHUB_REF_TYPE')
        repoOwner = os.getenv('GITHUB_REPOSITORY_OWNER')
        isMainRepo = os.getenv('IS_MAIN_REPO') == 'true'
        isMainRepo = True
        isRelease = os.getenv('IS_RELEASE') == 'true'
        managerVersion = os.getenv('MANAGER_VERSION')
        version = os.getenv('VERSION')
        deploys = None
        dockerPublishTags = None
        npmPublishTag = None
        deployEnvironment = None
        eventConfig = None
        
        print(eventName)
        print(refName)
        print(refType)
        print(repoOwner)
        print(isMainRepo)
        print(isRelease)
        print(managerVersion)
        print(version)

        f = open(".ci_cd/ci_cd.json")
        data = json.load(f)
        f.close()

        if data is not None and eventName in data:
          eventConfig = data[eventName]

        if eventName == "push" and refType == "branch" and isinstance(eventConfig, dict):
          eventConfig = eventConfig.get(refName)
        
        print(eventConfig)

        if eventConfig is not None:
            if eventName == "workflow_dispatch":
                deploys = eventConfig.get('deploy')
                if isinstance(deploys, dict):
                    deploys = deploys["release"] if isRelease else deploys["snapshot"]
            elif eventName == "push":
                deploys = eventConfig.get('deploy')
                if 'distribute' in eventConfig:
                    dockerPublishTags = eventConfig['distribute'].get('docker')
                    npmPublishTag = eventConfig['distribute'].get('npm')
            elif eventName == "release":
                deploys = eventConfig.get('deploy')
                if 'distribute' in eventConfig:
                    dockerPublishTags = eventConfig['distribute'].get('docker')
                    npmPublishTag = eventConfig['distribute'].get('npm')

        if isMainRepo:

          if dockerPublishTags is not None:
            dockerPublishTags = ",".join(map(lambda t: t.strip(), dockerPublishTags.split(",")))
            if "$version" in dockerPublishTags:
                firstDockerTag = version
                dockerPublishTags = dockerPublishTags.replace("$version", version)
            else:
              dockerPublishTags = dockerPublishTags.replace("$version", version)
              firstDockerTag = dockerPublishTags.split(",")[0]

            os.system(f"echo 'firstDockerTag={firstDockerTag}' >> $GITHUB_OUTPUT")
            print(f"Manager tags to push to docker hub: {dockerPublishTags}")
            if repoOwner == 'denniskuijs':
              os.system(f"echo 'dockerTags={dockerPublishTags}' >> $GITHUB_OUTPUT")

          if npmPublishTag is not None and repoOwner == 'denniskuijs':
            npmPublishTag = npmPublishTag.replace("$version", version)
            print(f"npm publish version: {npmPublishTag}")
            os.system(f"echo 'npmTag={npmPublishTag}' >> $GITHUB_OUTPUT")

        deployStr = None
        if deploys is not None and repoOwner == 'denniskuijs':
          if not isinstance(deploys, list):
            deploys = [deploys]

          deployStr = ""
          managerTagDefault = '#ref'

          for deploy in deploys:
            if 'environment' in deploy:
              deployStr += deploy['environment']
            deployStr += ":"
            if 'managerTag' in deploy:
              if isMainRepo:
                deployStr += deploy['managerTag']
              else:
                # Custom projects manager docker image must match the openremoteVersion from gradle.properties
                deployStr += managerVersion
            else:
              if isMainRepo:
                os.system("echo 'Manager tag not specified so using commit SHA'")
                deployStr += managerTagDefault
              else:
                # Custom projects manager docker image must match the openremoteVersion from gradle.properties
                deployStr += managerVersion

            deployStr += ";"

          deployStr = deployStr.rstrip(";")

        if deployStr is not None and len(deployStr) > 0:
          print(f"Deployments to deploy: {deployStr}")
          os.system(f"echo 'deploys={deployStr}' >> $GITHUB_OUTPUT")
      env:
        IS_MAIN_REPO: ${{ inputs.IS_MAIN_REPO }}
        MANAGER_VERSION: ${{ inputs.MANAGER_VERSION }}
        IS_RELEASE: ${{ inputs.IS_RELEASE }}
        VERSION: ${{ inputs.VERSION }}
